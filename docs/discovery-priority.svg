<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="da" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="daG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
  </defs>

  <rect width="880" height="580" fill="#ffffff"/>

  <!-- title -->
  <text x="440" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">es.exe 路径发现 · 7 级优先级</text>
  <text x="440" y="52" text-anchor="middle" font-size="11" fill="#64748b">find_es_exe() 依次尝试，命中即返回；全部失败返回 None</text>

  <!-- column headers -->
  <text x="70" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">优先级</text>
  <text x="340" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">查找策略</text>
  <text x="760" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">命中动作</text>

  <line x1="40" y1="92" x2="840" y2="92" stroke="#cbd5e1" stroke-width="1.2"/>

  <!-- ===== Level 0 ===== -->
  <circle cx="70" cy="125" r="18" fill="#2563eb" stroke="#1e40af" stroke-width="1.5"/>
  <text x="70" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">0</text>
  <rect x="110" y="105" width="460" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="125" y="122" font-size="12" font-weight="600" fill="#1e3a8a">检测运行中的 Everything 进程</text>
  <text x="125" y="138" font-size="10" fill="#475569">wmic process where name='Everything.exe' → 同目录 es.exe</text>
  <rect x="640" y="108" width="170" height="34" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="725" y="129" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14532d">✓ 命中即返回</text>
  <line x1="70" y1="145" x2="70" y2="165" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#da)"/>

  <!-- ===== Level 1 ===== -->
  <circle cx="70" cy="190" r="18" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5"/>
  <text x="70" y="195" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
  <rect x="110" y="170" width="460" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="125" y="187" font-size="12" font-weight="600" fill="#1e3a8a">path.env 配置文件中的 ES_PATH</text>
  <text x="125" y="203" font-size="10" fill="#475569">load_path_config() · 自动生成/更新</text>
  <rect x="640" y="173" width="170" height="34" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="725" y="194" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14532d">✓ 命中即返回</text>
  <line x1="70" y1="210" x2="70" y2="230" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#da)"/>

  <!-- ===== Level 2 ===== -->
  <circle cx="70" cy="255" r="18" fill="#6366f1" stroke="#4338ca" stroke-width="1.5"/>
  <text x="70" y="260" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
  <rect x="110" y="235" width="460" height="40" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.2"/>
  <text x="125" y="252" font-size="12" font-weight="600" fill="#3730a3">环境变量 EVERYTHING_PATH 下的 es.exe</text>
  <text x="125" y="268" font-size="10" fill="#475569">os.environ.get("EVERYTHING_PATH") + "\es.exe"</text>
  <rect x="640" y="238" width="170" height="34" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="725" y="259" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14532d">✓ 命中即返回</text>
  <line x1="70" y1="275" x2="70" y2="295" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#da)"/>

  <!-- ===== Level 3 ===== -->
  <circle cx="70" cy="320" r="18" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="70" y="325" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
  <rect x="110" y="300" width="460" height="40" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="125" y="317" font-size="12" font-weight="600" fill="#5b21b6">常用安装路径下的 es.exe</text>
  <text x="125" y="333" font-size="10" fill="#475569">C:\Program Files\Everything · (x86) · D:\Program Files\...</text>
  <rect x="640" y="303" width="170" height="34" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="725" y="324" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14532d">✓ 命中即返回</text>
  <line x1="70" y1="340" x2="70" y2="360" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#da)"/>

  <!-- ===== Level 4 ===== -->
  <circle cx="70" cy="385" r="18" fill="#a855f7" stroke="#7e22ce" stroke-width="1.5"/>
  <text x="70" y="390" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4</text>
  <rect x="110" y="365" width="460" height="40" rx="6" fill="#faf5ff" stroke="#a855f7" stroke-width="1.2"/>
  <text x="125" y="382" font-size="12" font-weight="600" fill="#6b21a8">环境变量 ES_PATH（直接指向 es.exe）</text>
  <text x="125" y="398" font-size="10" fill="#475569">os.environ.get("ES_PATH")</text>
  <rect x="640" y="368" width="170" height="34" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="725" y="389" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14532d">✓ 命中即返回</text>
  <line x1="70" y1="405" x2="70" y2="425" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#da)"/>

  <!-- ===== Level 5 ===== -->
  <circle cx="70" cy="450" r="18" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>
  <text x="70" y="455" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">5</text>
  <rect x="110" y="430" width="460" height="40" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="1.2"/>
  <text x="125" y="447" font-size="12" font-weight="600" fill="#92400e">系统 PATH 中的 es.exe</text>
  <text x="125" y="463" font-size="10" fill="#475569">shutil.which("es") · shutil.which("es.exe")</text>
  <rect x="640" y="433" width="170" height="34" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="725" y="454" text-anchor="middle" font-size="10.5" font-weight="600" fill="#14532d">✓ 命中即返回</text>
  <line x1="70" y1="470" x2="70" y2="490" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#da)"/>

  <!-- ===== Level 6 ===== -->
  <circle cx="70" cy="515" r="18" fill="#dc2626" stroke="#991b1b" stroke-width="1.5"/>
  <text x="70" y="520" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">6</text>
  <rect x="110" y="495" width="460" height="40" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.4"/>
  <text x="125" y="512" font-size="12" font-weight="600" fill="#991b1b">尝试启动 Everything 后重试进程检测</text>
  <text x="125" y="528" font-size="10" fill="#7f1d1d">start_everything_background() → 回到 Level 0 检测</text>
  <rect x="640" y="498" width="170" height="34" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.4"/>
  <text x="725" y="513" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">仍未命中 →</text>
  <text x="725" y="525" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">返回 None</text>

  <!-- bottom note -->
  <rect x="40" y="548" width="800" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="440" y="564" text-anchor="middle" font-size="10.5" fill="#475569">优先级 0–3 为常用命中路径；4–6 为补充兜底。配置成功后路径写入 path.env，后续命中 Level 1。</text>
</svg>
