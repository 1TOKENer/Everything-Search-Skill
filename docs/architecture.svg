<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="620" fill="#ffffff"/>

  <!-- title -->
  <text x="440" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Everything Search v1 — 系统架构</text>

  <!-- ===== Layer 1: User / Agent ===== -->
  <rect x="290" y="55" width="300" height="60" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="440" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">用户 (User) / AI Agent</text>
  <text x="440" y="100" text-anchor="middle" font-size="11" fill="#475569">触发词：搜索 / 查找 / 定位 文件</text>

  <!-- arrow down -->
  <line x1="440" y1="115" x2="440" y2="150" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrowBlue)"/>
  <text x="450" y="138" font-size="10" fill="#2563eb" font-weight="600">① 搜索请求</text>

  <!-- ===== Layer 2: search_core.py ===== -->
  <rect x="60" y="155" width="560" height="180" rx="12" fill="#f8fafc" stroke="#334155" stroke-width="1.8"/>
  <text x="80" y="178" font-size="14" font-weight="700" fill="#0f172a">search_core.py · 核心搜索脚本</text>
  <text x="80" y="195" font-size="10.5" fill="#64748b">入口 main_search() · 进程内仅写一次 path.env</text>

  <!-- 3 sub-modules -->
  <rect x="80" y="210" width="165" height="58" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="162" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">关键词提取</text>
  <text x="162" y="250" text-anchor="middle" font-size="10" fill="#64748b">支持 Everything 语法</text>
  <text x="162" y="263" text-anchor="middle" font-size="9.5" fill="#94a3b8">*.pdf / ext: / size: / path:</text>

  <rect x="257" y="210" width="165" height="58" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="339" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">es.exe 调用</text>
  <text x="339" y="250" text-anchor="middle" font-size="10" fill="#64748b">subprocess · -csv -size</text>
  <text x="339" y="263" text-anchor="middle" font-size="9.5" fill="#94a3b8">超时 30s · max-results</text>

  <rect x="434" y="210" width="165" height="58" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="516" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">结果格式化</text>
  <text x="516" y="250" text-anchor="middle" font-size="10" fill="#64748b">CSV 解析 · CJK 对齐</text>
  <text x="516" y="263" text-anchor="middle" font-size="9.5" fill="#94a3b8">表格输出 · 单位换算</text>

  <!-- capabilities bar -->
  <rect x="80" y="282" width="519" height="40" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1"/>
  <text x="339" y="300" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">编码自动检测 (utf-8 / gbk / cp1252 / shift-jis / utf-16-le)</text>
  <text x="339" y="315" text-anchor="middle" font-size="10.5" fill="#047857">纯搜索模式 · 默认不存储索引 · SearchResult namedtuple</text>

  <!-- ===== Right column: install.py + path.env ===== -->
  <!-- install.py -->
  <rect x="645" y="155" width="195" height="100" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="742" y="178" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">install.py</text>
  <text x="742" y="196" text-anchor="middle" font-size="10" fill="#78350f">安装发现脚本</text>
  <text x="742" y="214" text-anchor="middle" font-size="9.5" fill="#92400e">7 级优先级路径发现</text>
  <text x="742" y="228" text-anchor="middle" font-size="9.5" fill="#92400e">后台启动 Everything</text>
  <text x="742" y="242" text-anchor="middle" font-size="9.5" fill="#92400e">验证安装 · 保存配置</text>

  <!-- path.env -->
  <rect x="645" y="270" width="195" height="60" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="742" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">path.env</text>
  <text x="742" y="310" text-anchor="middle" font-size="9.5" fill="#7f1d1d">EVERYTHING_PATH=...</text>
  <text x="742" y="322" text-anchor="middle" font-size="9.5" fill="#7f1d1d">ES_PATH=...</text>

  <!-- arrow: search_core -> install (auto configure) -->
  <line x1="620" y1="200" x2="645" y2="200" stroke="#d97706" stroke-width="1.6" marker-end="url(#arrow)" stroke-dasharray="5 3"/>
  <text x="632" y="194" text-anchor="middle" font-size="9" fill="#b45309" font-weight="600">② 自动配置</text>
  <text x="632" y="218" text-anchor="middle" font-size="8.5" fill="#b45309">es.exe 未找到时</text>

  <!-- arrow: install <-> path.env (read/write) -->
  <line x1="742" y1="255" x2="742" y2="270" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="752" y1="270" x2="752" y2="255" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="775" y="266" font-size="9" fill="#475569">读写</text>

  <!-- arrow: search_core reads path.env -->
  <path d="M 620 285 L 640 285" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="630" y="280" text-anchor="middle" font-size="9" fill="#dc2626">③ 读取</text>

  <!-- ===== Layer 3: es.exe CLI ===== -->
  <rect x="200" y="370" width="480" height="62" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.6"/>
  <text x="440" y="395" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3">es.exe · Everything 命令行接口 (CLI)</text>
  <text x="440" y="414" text-anchor="middle" font-size="10.5" fill="#4338ca">-csv 输出标准 CSV · -size 附带文件大小 · -max-results 限制结果数</text>

  <!-- arrow down from search_core to es.exe -->
  <line x1="440" y1="335" x2="440" y2="370" stroke="#2563eb" stroke-width="1.8" marker-end="url(#arrowBlue)"/>
  <text x="450" y="358" font-size="10" fill="#2563eb" font-weight="600">④ subprocess.run</text>

  <!-- ===== Layer 4: Everything (NTFS index) ===== -->
  <rect x="200" y="465" width="480" height="70" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/>
  <text x="440" y="490" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">Everything · NTFS 索引服务</text>
  <text x="440" y="509" text-anchor="middle" font-size="10.5" fill="#166534">即时索引 · 毫秒级响应 · 后台运行 (Everything.exe -startup)</text>
  <text x="440" y="524" text-anchor="middle" font-size="9.5" fill="#15803d">未运行时自动后台启动 · 等待最多 5 秒</text>

  <!-- arrow down es.exe -> Everything -->
  <line x1="440" y1="432" x2="440" y2="465" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="450" y="453" font-size="10" fill="#16a34a" font-weight="600">⑤ IPC 查询</text>

  <!-- ===== Legend ===== -->
  <g transform="translate(60,560)">
    <text x="0" y="0" font-size="10.5" font-weight="700" fill="#0f172a">图例：</text>
    <rect x="42" y="-10" width="14" height="12" rx="2" fill="#eff6ff" stroke="#2563eb"/>
    <text x="62" y="0" font-size="10" fill="#475569">调用入口</text>
    <rect x="120" y="-10" width="14" height="12" rx="2" fill="#f8fafc" stroke="#334155"/>
    <text x="140" y="0" font-size="10" fill="#475569">核心脚本</text>
    <rect x="200" y="-10" width="14" height="12" rx="2" fill="#fffbeb" stroke="#d97706"/>
    <text x="220" y="0" font-size="10" fill="#475569">配置脚本</text>
    <rect x="280" y="-10" width="14" height="12" rx="2" fill="#fef2f2" stroke="#dc2626" stroke-dasharray="3 2"/>
    <text x="300" y="0" font-size="10" fill="#475569">配置文件</text>
    <rect x="360" y="-10" width="14" height="12" rx="2" fill="#eef2ff" stroke="#4f46e5"/>
    <text x="380" y="0" font-size="10" fill="#475569">外部 CLI</text>
    <rect x="440" y="-10" width="14" height="12" rx="2" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="460" y="0" font-size="10" fill="#475569">索引服务</text>
  </g>
</svg>
